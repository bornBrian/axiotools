<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#16a34a" stroke="#15803d" stroke-width="2"/>
  
  <!-- File/Document shape -->
  <g transform="translate(50, 40)">
    <!-- Document outline -->
    <rect x="5" y="5" width="90" height="110" rx="3" fill="white" stroke="#15803d" stroke-width="2"/>
    
    <!-- Lines on document (compressed) -->
    <line x1="15" y1="25" x2="85" y2="25" stroke="#16a34a" stroke-width="2"/>
    <line x1="15" y1="40" x2="85" y2="40" stroke="#16a34a" stroke-width="2"/>
    <line x1="15" y1="55" x2="60" y2="55" stroke="#16a34a" stroke-width="2"/>
    
    <!-- Compression arrows (representing compression) -->
    <g transform="translate(65, 75)">
      <path d="M 0 -10 L -5 0 L 0 10 M 0 -10 L 5 0 L 0 10" stroke="#16a34a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Plus/Tools symbol -->
  <g transform="translate(140, 130)">
    <circle cx="0" cy="0" r="18" fill="#fbbf24" stroke="white" stroke-width="2"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d" text-anchor="middle">AxioTools</text>
</svg>
